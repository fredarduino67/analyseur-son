<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rando">
  <link rel="manifest" href="manifest.json">
  <title>Rando France</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
    body.dark  { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text2: #94a3b8; --border: #334155; }
    body.light { --bg: #f0f4f8; --card: #ffffff;  --text: #0f172a; --text2: #64748b; --border: #e2e8f0; }
    #app { display: flex; flex-direction: column; height: 100%; background: var(--bg); }
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top));
      background: var(--card); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 9999;
    }
    #topbar h1 { font-size: 17px; font-weight: 700; color: var(--text); }
    .tbtn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px;
    }
    #map-container { flex: 1; position: relative; min-height: 0; }
    #map { width: 100%; height: 100%; }
    #fab-center {
      position: absolute; right: 14px; bottom: 14px; z-index: 9000;
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #fab-type {
      position: absolute; right: 14px; bottom: 66px; z-index: 9000;
      border-radius: 12px; padding: 8px 12px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #statsbar {
      display: flex; align-items: center; justify-content: space-around;
      background: var(--card); border-top: 1px solid var(--border);
      padding: 10px 8px; padding-bottom: max(10px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }
    .stat { text-align: center; flex: 1; }
    .sval { font-size: 20px; font-weight: 700; color: var(--text); }
    .slbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
    #recbtn {
      width: 50px; height: 50px; border-radius: 50%; border: none;
      background: #2563eb; cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #recbtn.on { background: #dc2626; }
    #toast {
      position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff;
      padding: 8px 18px; border-radius: 99px; font-size: 13px;
      z-index: 99999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
  </style>
</head>
<body class="dark">
<div id="app">
  <div id="topbar">
    <div class="tbtn" id="theme-btn">☀️</div>
    <h1>Rando France</h1>
    <div class="tbtn" id="clear-btn">🗑️</div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="fab-type">🥾 Pied</div>
    <div id="fab-center">📍</div>
    <div id="toast"></div>
  </div>
  <div id="statsbar">
    <div class="stat"><div class="sval" id="sdist">0.0</div><div class="slbl">km</div></div>
    <div class="stat"><div class="sval" id="salt">–</div><div class="slbl">alt. m</div></div>
    <div class="stat">
      <button id="recbtn">⏺️</button>
    </div>
    <div class="stat"><div class="sval" id="sdur">00:00</div><div class="slbl">durée</div></div>
    <div class="stat"><div class="sval" id="sspeed">0.0</div><div class="slbl">km/h</div></div>
  </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
var dark = true, randoType = 'pied', recording = false;
var track = [], trackLine = null, startTime = null;
var timer = null, watchId = null, userMarker = null, userPos = null;
var map;

function init() {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  map.setView([46.5, 2.5], 6);
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17, subdomains: 'abc'
  }).addTo(map);
  setTimeout(function(){ map.invalidateSize(); }, 300);
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function fmt(ms) {
  var s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  if (h > 0) return h+':'+pad(m%60)+':'+pad(s%60);
  return pad(m)+':'+pad(s%60);
}
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function dist(pts) {
  var d = 0;
  for (var i = 1; i < pts.length; i++)
    d += map.distance([pts[i-1].lat, pts[i-1].lng],[pts[i].lat, pts[i].lng]);
  return d;
}

function addPt(lat, lng, alt) {
  track.push({lat:lat, lng:lng});
  if (track.length > 1) {
    var ll = track.map(function(p){ return [p.lat, p.lng]; });
    if (trackLine) map.removeLayer(trackLine);
    trackLine = L.polyline(ll, { color: randoType==='velo' ? '#f59e0b' : '#3b82f6', weight: 5 }).addTo(map);
  }
  document.getElementById('sdist').textContent = (dist(track)/1000).toFixed(2);
  if (alt && alt > 0) document.getElementById('salt').textContent = Math.round(alt);
}

function dotIcon() {
  return L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid white;box-shadow:0 0 0 3px rgba(59,130,246,0.35)"></div>',
    iconSize: [16,16], iconAnchor: [8,8]
  });
}

function setPos(lat, lng, alt, speed) {
  userPos = [lat, lng];
  if (!userMarker) userMarker = L.marker([lat,lng],{icon:dotIcon()}).addTo(map);
  else userMarker.setLatLng([lat,lng]);
  if (alt != null && alt > 0) document.getElementById('salt').textContent = Math.round(alt);
  if (speed != null) document.getElementById('sspeed').textContent = (speed*3.6).toFixed(1);
  if (recording) addPt(lat, lng, alt);
}

document.getElementById('recbtn').addEventListener('click', function() {
  if (!recording) {
    recording = true; track = []; startTime = Date.now();
    this.classList.add('on'); this.textContent = '⏹️';
    document.getElementById('sdist').textContent = '0.0';
    document.getElementById('sdur').textContent = '00:00';
    timer = setInterval(function(){
      document.getElementById('sdur').textContent = fmt(Date.now()-startTime);
    }, 1000);
    watchId = navigator.geolocation.watchPosition(function(p){
      setPos(p.coords.latitude, p.coords.longitude, p.coords.altitude, p.coords.speed);
    }, function(){ toast('GPS non disponible'); }, { enableHighAccuracy:true, maximumAge:2000 });
    toast('Enregistrement démarré');
  } else {
    recording = false;
    this.classList.remove('on'); this.textContent = '⏺️';
    clearInterval(timer);
    if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    toast('Arrêté — ' + document.getElementById('sdist').textContent + ' km');
  }
});

document.getElementById('fab-center').addEventListener('click', function() {
  if (userPos) { map.setView(userPos, 15); return; }
  navigator.geolocation.getCurrentPosition(function(p){
    userPos = [p.coords.latitude, p.coords.longitude];
    map.setView(userPos, 15);
    setPos(p.coords.latitude, p.coords.longitude, p.coords.altitude, null);
  }, function(){ toast('Activez le GPS'); });
});

document.getElementById('fab-type').addEventListener('click', function() {
  randoType = randoType==='pied' ? 'velo' : 'pied';
  this.textContent = randoType==='pied' ? '🥾 Pied' : '🚴 Vélo';
  if (trackLine) trackLine.setStyle({ color: randoType==='velo' ? '#f59e0b' : '#3b82f6' });
});

document.getElementById('theme-btn').addEventListener('click', function() {
  dark = !dark;
  document.body.className = dark ? 'dark' : 'light';
  this.textContent = dark ? '☀️' : '🌙';
});

document.getElementById('clear-btn').addEventListener('click', function() {
  if (recording) { toast('Arrêtez d\'abord'); return; }
  if (trackLine) { map.removeLayer(trackLine); trackLine = null; }
  track = [];
  document.getElementById('sdist').textContent = '0.0';
  document.getElementById('salt').textContent = '–';
  document.getElementById('sdur').textContent = '00:00';
  document.getElementById('sspeed').textContent = '0.0';
  toast('Tracé effacé');
});

window.addEventListener('load', function() {
  init();
  navigator.geolocation.getCurrentPosition(function(p){
    userPos = [p.coords.latitude, p.coords.longitude];
    map.setView(userPos, 14);
    setPos(p.coords.latitude, p.coords.longitude, p.coords.altitude, null);
  }, function(){});
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</body>
</html>
